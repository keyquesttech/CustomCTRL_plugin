# ------------------------------------------------------------------
# CustomCTRL — Example configuration
# ------------------------------------------------------------------
# Copy this section into your printer.cfg and adjust pins to match
# your wiring (e.g. SKR Mini E3 V3.0, BTT boards).
#
# Pin syntax:
#   PA8        - active high
#   ^PA8       - internal pull-up
#   !PA8       - active low (inverted)
#   ^!PA8      - pull-up + inverted
#
# Jog loop runs at 40 Hz (0.025 s per tick). With increment 0, step = speed * 0.025.
# Example: y_jog_speed 50, y_jog_increment 0 → 1.25 mm per tick → 50 mm/s.
# Extrusion: extrude_increment 0.208 at 40 Hz → 8.32 mm/s filament.
# ------------------------------------------------------------------

[customctrl]
# --- Jog buttons (hold to jog) ---
# Define only the directions you have wired.
#x_pos_pin: ^PA8
#x_neg_pin: ^PA9
y_pos_pin: !PC2            # Y positive
#y_neg_pin: ^PB3
z_pos_pin: !PC1            # Z positive (up)
#z_neg_pin: ^PB5

# --- Extrude / retract (hold for continuous) ---
extrude_pin: !PC0          # hold to extrude
#retract_pin: ^PB7

# --- Jog speed (mm/s) ---
#jog_speed: 10              # default all axes
y_jog_speed: 50             # Y override
z_jog_speed: 15             # Z override (often slower)

# --- Jog increment (mm per tick). 0 = use speed * 0.025 (40 Hz) ---
y_jog_increment: 0
z_jog_increment: 0

# --- Extrusion (mm per tick at 40 Hz) ---
# 0.208 mm/tick = 8.32 mm/s; 0.375 mm/tick = 15 mm/s
extrude_speed: 8.32
retract_speed: 15.0
extrude_increment: 0.208
retract_increment: 0.375

# --- Console ---
verbose: True

# --- Macro buttons (press once; need both _pin and _gcode) ---
#macro_1_pin: ^PB4
#macro_1_gcode: MY_CUSTOM_MACRO
#macro_2_pin: ^PB5
#macro_2_gcode: LOAD_FILAMENT
