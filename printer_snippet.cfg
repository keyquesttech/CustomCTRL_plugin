# ------------------------------------------------------------------
# CustomCTRL — Example configuration block
# ------------------------------------------------------------------
# Copy this section into your printer.cfg and adjust pin names to
# match your wiring on the SKR Mini E3 V3.0 (or any other MCU).
#
# Pin syntax follows Klipper conventions:
#   PA8        - pin PA8, active-high
#   ^PA8       - pin PA8 with internal pull-up
#   !PA8       - pin PA8, active-low (inverted)
#   ^!PA8      - pull-up + inverted
#
# Only define the pins you actually have wired. Every option below
# is optional — omit any line you don't need.
# ------------------------------------------------------------------

[customctrl]
# --- Jog buttons (hold to jog continuously) ---
# Each axis has a positive and negative direction pin.
# Define only the directions you have wired.
#x_pos_pin: ^PA8           # X positive direction
#x_neg_pin: ^PA9           # X negative direction
#y_pos_pin: ^PA10          # Y positive direction
#y_neg_pin: ^PB3           # Y negative direction
#z_pos_pin: ^PB4           # Z positive direction (up)
#z_neg_pin: ^PB5           # Z negative direction (down)

# --- Extrude / retract buttons (hold for continuous action) ---
#extrude_pin: ^PB6         # hold to extrude
#retract_pin: ^PB7         # hold to retract

# --- Per-axis jog speed (mm/s) ---
# Each axis can have its own speed. Falls back to jog_speed if not set.
#jog_speed: 10              # default for all axes
#x_jog_speed: 10            # override for X
#y_jog_speed: 10            # override for Y
#z_jog_speed: 5             # override for Z (often slower)

# --- Per-axis jog increment (mm per tick) ---
# When set, overrides the speed-derived step for that axis.
# At 20 ticks/sec, 0.5 mm/tick = 10 mm/s effective speed.
# Leave at 0 (default) to derive from speed automatically.
#x_jog_increment: 0         # 0 = use x_jog_speed * 0.05
#y_jog_increment: 0         # 0 = use y_jog_speed * 0.05
#z_jog_increment: 0         # 0 = use z_jog_speed * 0.05

# --- Extrusion tuning (manual values) ---
#extrude_speed: 5.0         # mm/s while extruding
#retract_speed: 2.0         # mm/s while retracting
#extrude_increment: 0.25    # mm of filament per tick while extruding (5mm/s at 20Hz)
#retract_increment: 0.25    # mm of filament per tick while retracting

# --- Terminal output ---
#verbose: False              # set True to see button events in console

# --- Debug log (for Mainsail download) ---
# Debug log is written to this path so you can download it from Mainsail
# (Machine -> Logs). Default: ~/printer_data/logs/customctrl_debug.log
#debug_log_path: ~/printer_data/logs/customctrl_debug.log

# --- Macro buttons (press once to fire a G-code macro) ---
# Up to 8 macro buttons (macro_1 through macro_8).
# Each needs both a _pin and a _gcode entry.
#macro_1_pin: ^PB4
#macro_1_gcode: MY_CUSTOM_MACRO

#macro_2_pin: ^PB5
#macro_2_gcode: LOAD_FILAMENT
